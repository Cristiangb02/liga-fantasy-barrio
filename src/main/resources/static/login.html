<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Liga Fantasy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
<div class="login-box">
    <h2>Liga Fantasy</h2>
    <input type="text" id="nombre" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <button class="btn-login" onclick="login()">Entrar</button>
    <button class="btn-register" onclick="registro()">Solicitar Acceso (solo si no tenías cuenta)</button>
    <div id="error-msg"></div>
    <div id="success-msg"></div>
</div>

<script src="js/login.js"></script>

</body>
</html>
